<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benji Dodge 🐕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1F2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #7C3AED;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="game" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let benji = { x: 280, y: 340, size: 40, speed: 5 };
        let obstacles = [];
        let score = 0;
        let gameOver = false;
        let frame = 0;
        let difficulty = 1;
        
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') benji.x -= benji.speed;
            if (e.key === 'ArrowRight') benji.x += benji.speed;
            benji.x = Math.max(0, Math.min(canvas.width - benji.size, benji.x));
        });
        
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            if (x < canvas.width / 2) benji.x -= benji.speed;
            else benji.x += benji.speed;
            benji.x = Math.max(0, Math.min(canvas.width - benji.size, benji.x));
        });
        
        function spawnObstacle() {
            const size = 25 + Math.random() * 20;
            obstacles.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                size: size,
                speed: 2 + Math.random() * 2 + difficulty
            });
        }
        
        function draw() {
            ctx.fillStyle = '#1F2937';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw Benji
            ctx.font = `${benji.size}px Arial`;
            ctx.fillText('🐕', benji.x, benji.y + benji.size);
            
            // Draw obstacles
            obstacles.forEach(obs => {
                ctx.font = `${obs.size}px Arial`;
                ctx.fillText('🎾', obs.x, obs.y + obs.size);
            });
            
            // Draw score
            ctx.fillStyle = '#F59E0B';
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${score}`, 10, 30);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#EF4444';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
                ctx.fillStyle = '#F59E0B';
                ctx.font = '25px Arial';
                ctx.fillText(`Final Score: ${score}`, canvas.width/2, canvas.height/2 + 20);
                ctx.fillStyle = '#06B6D4';
                ctx.font = '18px Arial';
                ctx.fillText('Tap or Press Space to Restart', canvas.width/2, canvas.height/2 + 60);
                ctx.textAlign = 'left';
            }
        }
        
        function update() {
            if (gameOver) return;
            
            frame++;
            if (frame % 60 === 0) {
                difficulty += 0.1;
                spawnObstacle();
            }
            
            obstacles.forEach((obs, i) => {
                obs.y += obs.speed;
                
                // Collision
                if (benji.x < obs.x + obs.size &&
                    benji.x + benji.size > obs.x &&
                    benji.y < obs.y + obs.size &&
                    benji.y + benji.size > obs.y) {
                    gameOver = true;
                }
                
                // Score
                if (obs.y > canvas.height) {
                    score += 10;
                    obstacles.splice(i, 1);
                }
            });
        }
        
        function reset() {
            benji.x = 280;
            obstacles = [];
            score = 0;
            gameOver = false;
            frame = 0;
            difficulty = 1;
        }
        
        document.addEventListener('keydown', e => {
            if (gameOver && e.key === ' ') reset();
        });
        
        canvas.addEventListener('click', () => {
            if (gameOver) reset();
        });
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        loop();
    </script>
</body>
</html>
