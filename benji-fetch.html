<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benji Fetch 🦴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #87CEEB 0%, #98FB98 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }
        
        h1 {
            color: #2c5f2d;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 0 #fff;
        }
        
        #gameCanvas {
            border: 4px solid #2c5f2d;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: linear-gradient(180deg, #87CEEB 60%, #90EE90 60%);
        }
        
        .score-board {
            display: flex;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            color: #2c5f2d;
            font-weight: bold;
        }
        
        .score-board span {
            background: rgba(255,255,255,0.8);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            border: 2px solid #2c5f2d;
        }
        
        .controls {
            margin-top: 1rem;
            color: #2c5f2d;
            font-size: 1rem;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.8rem 1.5rem;
            background: #2c5f2d;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
        }
        
        .back-btn:hover {
            background: #1a4a1c;
        }
    </style>
</head>
<body>
    <a href="games.html" class="back-btn">← Back to Arcade</a>
    <h1>🦴 Benji Fetch 🦴</h1>
    <div class="score-board">
        <span>Score: <span id="score">0</span></span>
        <span>Lives: <span id="lives">5</span></span>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <p class="controls">← → or Arrow Keys to move | SPACE to start</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        
        let score = 0;
        let lives = 5;
        let gameRunning = false;
        let gameOver = false;
        
        const benji = {
            x: 300,
            y: 320,
            width: 60,
            height: 50,
            speed: 7,
            dx: 0,
            tailWag: 0
        };
        
        const ball = {
            x: 300,
            y: 100,
            radius: 15,
            dx: 0,
            dy: 0,
            speed: 5,
            active: false,
            rotation: 0
        };
        
        const grassHeight = 80;
        
        function drawBenji() {
            ctx.save();
            ctx.translate(benji.x, benji.y);
            
            benji.tailWag += 0.3;
            const tailWag = Math.sin(benji.tailWag) * 0.3;
            
            ctx.fillStyle = '#D2691E';
            ctx.beginPath();
            ctx.ellipse(0, 0, 30, 25, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.ellipse(-25, -5, 15, 8, tailWag, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#D2691E';
            ctx.beginPath();
            ctx.ellipse(0, -20, 12, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.moveTo(-8, -30);
            ctx.lineTo(-12, -45);
            ctx.lineTo(-4, -35);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(8, -30);
            ctx.lineTo(12, -45);
            ctx.lineTo(4, -35);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(-8, -22, 4, 0, Math.PI * 2);
            ctx.arc(8, -22, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-7, -23, 1.5, 0, Math.PI * 2);
            ctx.arc(9, -23, 1.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(0, -15, 5, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.ellipse(0, -12, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.ellipse(25, 5, 8, 12, 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(-25, 5, 8, 12, -0.3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawBall() {
            if (!ball.active) return;
            
            ctx.save();
            ctx.translate(ball.x, ball.y);
            ball.rotation += 0.2;
            ctx.rotate(ball.rotation);
            
            const gradient = ctx.createRadialGradient(0, -5, 0, 0, 0, ball.radius);
            gradient.addColorStop(0, '#FF6B6B');
            gradient.addColorStop(0.7, '#FF0000');
            gradient.addColorStop(1, '#CC0000');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-ball.radius/2, -ball.radius/3);
            ctx.quadraticCurveTo(0, -ball.radius/2, ball.radius/2, -ball.radius/3);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawClouds() {
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            drawCloud(100, 40, 30);
            drawCloud(250, 60, 40);
            drawCloud(450, 35, 35);
            drawCloud(550, 70, 25);
        }
        
        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.2, size * 0.7, 0, Math.PI * 2);
            ctx.arc(x + size * 1.5, y, size * 0.8, 0, Math.PI * 2);
            ctx.arc(x + size * 0.5, y + size * 0.3, size * 0.6, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function throwBall() {
            ball.active = true;
            ball.x = Math.random() < 0.5 ? 30 : canvas.width - 30;
            ball.y = 50;
            
            const targetX = Math.random() * (canvas.width - 100) + 50;
            const angle = Math.atan2(canvas.height - grassHeight - ball.y - 30, targetX - ball.x);
            
            ball.dx = Math.cos(angle) * ball.speed * (1 + score * 0.02);
            ball.dy = Math.sin(angle) * ball.speed * (1 + score * 0.02) + 2;
        }
        
        function update() {
            if (!gameRunning || gameOver) return;
            
            benji.x += benji.dx;
            
            if (benji.x < 40) benji.x = 40;
            if (benji.x > canvas.width - 40) benji.x = canvas.width - 40;
            
            if (ball.active) {
                ball.x += ball.dx;
                ball.y += ball.dy;
                
                if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                    ball.dx *= -0.8;
                    ball.x = ball.x < ball.radius ? ball.radius : canvas.width - ball.radius;
                }
                
                if (ball.y - ball.radius < 0) {
                    ball.dy *= -0.7;
                    ball.y = ball.radius;
                }
                
                if (ball.y > canvas.height - grassHeight) {
                    ball.active = false;
                    lives--;
                    livesEl.textContent = lives;
                    
                    if (lives <= 0) {
                        gameOver = true;
                    } else {
                        setTimeout(() => {
                            if (!gameOver) throwBall();
                        }, 1000);
                    }
                }
                
                const dx = ball.x - benji.x;
                const dy = ball.y - (benji.y - 10);
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < ball.radius + 30) {
                    score += 10;
                    scoreEl.textContent = score;
                    ball.active = false;
                    
                    showCatchEffect(benji.x, benji.y - 30);
                    
                    setTimeout(() => {
                        if (!gameOver) throwBall();
                    }, 800);
                }
            }
        }
        
        let catchEffects = [];
        
        function showCatchEffect(x, y) {
            catchEffects.push({
                x: x,
                y: y,
                life: 30,
                texts: ['+10', 'Good boy!', 'Fetch!', 'Nice!']
            });
        }
        
        function drawEffects() {
            catchEffects = catchEffects.filter(e => {
                e.life--;
                e.y -= 1;
                
                ctx.fillStyle = `rgba(255, 215, 0, ${e.life / 30})`;
                ctx.font = 'bold 20px Comic Sans MS';
                ctx.textAlign = 'center';
                ctx.fillText(e.texts[Math.floor((30 - e.life) / 10) % e.texts.length] || '+10', e.x, e.y);
                
                return e.life > 0;
            });
        }
        
        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 40px Comic Sans MS';
            ctx.textAlign = 'center';
            ctx.fillText('🦴 BENJI FETCH 🦴', canvas.width/2, 120);
            
            ctx.font = '20px Comic Sans MS';
            ctx.fillText('Press SPACE to start', canvas.width/2, 200);
            ctx.fillText('Use ← → or Arrow Keys to move', canvas.width/2, 240);
            ctx.fillText('Catch the ball before it hits the ground!', canvas.width/2, 280);
        }
        
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#FF6B6B';
            ctx.font = 'bold 50px Comic Sans MS';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER!', canvas.width/2, 150);
            
            ctx.fillStyle = '#fff';
            ctx.font = '30px Comic Sans MS';
            ctx.fillText('Final Score: ' + score, canvas.width/2, 220);
            
            ctx.font = '20px Comic Sans MS';
            ctx.fillText('Press SPACE to play again', canvas.width/2, 300);
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawClouds();
            
            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, canvas.height - grassHeight, canvas.width, grassHeight);
            
            ctx.fillStyle = '#228B22';
            for (let i = 0; i < canvas.width; i += 30) {
                ctx.fillRect(i, canvas.height - grassHeight, 3, 10);
            }
            
            drawBenji();
            drawBall();
            drawEffects();
            
            if (!gameRunning && !gameOver) {
                drawStartScreen();
            }
            
            if (gameOver) {
                drawGameOver();
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                benji.dx = -benji.speed;
            }
            if (e.key === 'ArrowRight' || e.key === 'd') {
                benji.dx = benji.speed;
            }
            if (e.key === ' ' || e.key === 'Space') {
                if (!gameRunning && !gameOver) {
                    gameRunning = true;
                    throwBall();
                } else if (gameOver) {
                    score = 0;
                    lives = 5;
                    scoreEl.textContent = score;
                    livesEl.textContent = lives;
                    gameOver = false;
                    gameRunning = true;
                    benji.x = 300;
                    throwBall();
                }
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd') {
                benji.dx = 0;
            }
        });
        
        gameLoop();
    </script>
</body>
</html>
