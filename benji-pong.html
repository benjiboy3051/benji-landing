<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benji Pong 🎾</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .game-header {
            text-align: center;
            padding: 1rem;
            width: 100%;
        }
        
        .title {
            font-size: 2rem;
            color: #ff6600;
            text-shadow: 0 0 20px #ff6600;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .stats {
            display: flex;
            gap: 3rem;
            justify-content: center;
            margin-top: 1rem;
            font-size: 1.2rem;
        }
        
        .stat {
            background: rgba(255, 102, 0, 0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 10px;
            border: 2px solid #ff6600;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.8rem;
        }
        
        .stat-value {
            color: #ff6600;
            font-weight: bold;
            font-size: 1.5rem;
        }
        
        #playerScore, #aiScore {
            font-size: 2rem;
        }
        
        canvas {
            border: 4px solid #ff6600;
            border-radius: 10px;
            background: radial-gradient(circle, #1a0a0a 0%, #0a0a0a 100%);
            cursor: none;
        }
        
        .instructions {
            margin-top: 1rem;
            color: #888;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .game-over.show {
            display: flex;
        }
        
        .game-over h2 {
            font-size: 3rem;
            color: #ff6600;
            text-shadow: 0 0 30px #ff6600;
            margin-bottom: 1rem;
        }
        
        .game-over p {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .winner-text {
            color: #00ff00;
        }
        
        .loser-text {
            color: #ff0000;
        }
        
        .restart-btn {
            margin-top: 1.5rem;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: #ff6600;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff6600;
        }
        
        .ball-trail {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6600;
            pointer-events: none;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="title">🐶 BENJI PONG 🎾</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">YOU</div>
                <div class="stat-value" id="playerScore">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">AI</div>
                <div class="stat-value" id="aiScore">0</div>
            </div>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <p class="instructions">Move mouse or touch to control your paddle. First to 7 wins!</p>
    
    <div class="game-over" id="gameOver">
        <h2 id="gameOverTitle">YOU WIN!</h2>
        <p id="finalScore"></p>
        <button class="restart-btn" onclick="restartGame()">PLAY AGAIN 🐶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let playerScore = 0;
        let aiScore = 0;
        const winningScore = 7;
        let gameRunning = true;
        
        const paddleWidth = 12;
        const paddleHeight = 80;
        const ballRadius = 10;
        
        const player = {
            x: 20,
            y: canvas.height / 2 - paddleHeight / 2,
            dy: 0,
            speed: 8
        };
        
        const ai = {
            x: canvas.width - 20 - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            speed: 4
        };
        
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 4,
            dy: 2,
            speed: 5,
            maxSpeed: 10
        };
        
        let ballTrail = [];
        const maxTrailLength = 8;
        
        const net = {
            x: canvas.width / 2 - 2,
            y: 0,
            width: 4,
            height: 15,
            gap: 15
        };
        
        function drawNet() {
            ctx.fillStyle = '#333';
            for (let y = 0; y < canvas.height; y += net.height + net.gap) {
                ctx.fillRect(net.x, y, net.width, net.height);
            }
        }
        
        function drawPaddle(paddle, isPlayer) {
            ctx.fillStyle = isPlayer ? '#ff6600' : '#00ffff';
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = isPlayer ? '#ff6600' : '#00ffff';
            
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddleWidth, paddleHeight, 5);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = isPlayer ? '#ffaa00' : '#00ffff';
            ctx.beginPath();
            ctx.roundRect(paddle.x + 3, paddle.y + 10, paddleWidth - 6, 15, 3);
            ctx.fill();
        }
        
        function drawBall() {
            for (let i = 0; i < ballTrail.length; i++) {
                const t = ballTrail[i];
                const alpha = (i / ballTrail.length) * 0.3;
                ctx.beginPath();
                ctx.arc(t.x, t.y, ballRadius * (i / ballTrail.length), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 102, 0, ${alpha})`;
                ctx.fill();
            }
            
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff6600';
            
            const gradient = ctx.createRadialGradient(
                ball.x - 3, ball.y - 3, 0,
                ball.x, ball.y, ballRadius
            );
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.3, '#ff6600');
            gradient.addColorStop(1, '#cc3300');
            
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }
        
        function drawDogPaddle(x, y, isPlayer) {
            ctx.fillStyle = isPlayer ? '#ff6600' : '#00ffff';
            ctx.beginPath();
            ctx.arc(x + paddleWidth / 2, y + paddleHeight / 2, 35, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            const eyeX = x + paddleWidth / 2 + (isPlayer ? 8 : -8);
            ctx.beginPath();
            ctx.arc(eyeX, y + paddleHeight / 2 - 8, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(eyeX + (isPlayer ? 2 : -2), y + paddleHeight / 2 - 8, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + paddleWidth / 2, y + paddleHeight / 2 + 12, 8, 0, Math.PI);
            ctx.fill();
        }
        
        function update(deltaTime) {
            if (!gameRunning) return;
            
            player.y += player.dy * deltaTime * 60;
            player.y = Math.max(0, Math.min(canvas.height - paddleHeight, player.y));
            
            const aiTarget = ball.y - paddleHeight / 2;
            if (ball.dx > 0 && ball.x > canvas.width / 2) {
                ai.y += (aiTarget - ai.y) * 0.08;
            }
            ai.y = Math.max(0, Math.min(canvas.height - paddleHeight, ai.y));
            
            ballTrail.push({ x: ball.x, y: ball.y });
            if (ballTrail.length > maxTrailLength) {
                ballTrail.shift();
            }
            
            ball.x += ball.dx * deltaTime * 60;
            ball.y += ball.dy * deltaTime * 60;
            
            if (ball.y - ballRadius < 0) {
                ball.y = ballRadius;
                ball.dy = -ball.dy;
            }
            if (ball.y + ballRadius > canvas.height) {
                ball.y = canvas.height - ballRadius;
                ball.dy = -ball.dy;
            }
            
            const playerHit = ball.x - ballRadius < player.x + paddleWidth &&
                ball.x + ballRadius > player.x &&
                ball.y > player.y &&
                ball.y < player.y + paddleHeight;
            
            if (playerHit && ball.dx < 0) {
                ball.x = player.x + paddleWidth + ballRadius;
                
                const hitPos = (ball.y - (player.y + paddleHeight / 2)) / (paddleHeight / 2);
                ball.dy = hitPos * 6;
                ball.dx = Math.min(-ball.dx * 1.05, -ball.maxSpeed);
            }
            
            const aiHit = ball.x + ballRadius > ai.x &&
                ball.x - ballRadius < ai.x + paddleWidth &&
                ball.y > ai.y &&
                ball.y < ai.y + paddleHeight;
            
            if (aiHit && ball.dx > 0) {
                ball.x = ai.x - ballRadius;
                
                const hitPos = (ball.y - (ai.y + paddleHeight / 2)) / (paddleHeight / 2);
                ball.dy = hitPos * 6;
                ball.dx = Math.max(ball.dx * 1.05, ball.maxSpeed);
            }
            
            if (ball.x < -ballRadius) {
                aiScore++;
                document.getElementById('aiScore').textContent = aiScore;
                resetBall(false);
            }
            if (ball.x > canvas.width + ballRadius) {
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                resetBall(true);
            }
            
            if (playerScore >= winningScore || aiScore >= winningScore) {
                endGame();
            }
        }
        
        function resetBall(playerStarts) {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = 5;
            ball.dx = playerStarts ? ball.speed : -ball.speed;
            ball.dy = (Math.random() - 0.5) * 4;
            ballTrail = [];
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawNet();
            drawPaddle(player, true);
            drawPaddle(ai, false);
            drawBall();
        }
        
        function endGame() {
            gameRunning = false;
            const playerWins = playerScore >= winningScore;
            document.getElementById('gameOverTitle').textContent = playerWins ? 'YOU WIN!' : 'AI WINS!';
            document.getElementById('gameOverTitle').className = playerWins ? 'winner-text' : 'loser-text';
            document.getElementById('finalScore').textContent = `${playerScore} - ${aiScore}`;
            document.getElementById('gameOver').classList.add('show');
        }
        
        function restartGame() {
            playerScore = 0;
            aiScore = 0;
            document.getElementById('playerScore').textContent = 0;
            document.getElementById('aiScore').textContent = 0;
            player.y = canvas.height / 2 - paddleHeight / 2;
            ai.y = canvas.height / 2 - paddleHeight / 2;
            resetBall(true);
            gameRunning = true;
            document.getElementById('gameOver').classList.remove('show');
        }
        
        let lastTime = 0;
        function gameLoop(timestamp) {
            const deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            
            update(deltaTime);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleY = canvas.height / rect.height;
            const mouseY = (e.clientY - rect.top) * scaleY;
            player.y = mouseY - paddleHeight / 2;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            const touchY = (touch.clientY - rect.top) * scaleY;
            player.y = touchY - paddleHeight / 2;
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            const touchY = (touch.clientY - rect.top) * scaleY;
            player.y = touchY - paddleHeight / 2;
        });
        
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
