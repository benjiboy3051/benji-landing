  // Web Audio for milestone ding

  function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(320, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(640, audioCtx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.12);
  }
  function playDing() {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.06);
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.25);

  // ---- CACTUS DRAWING ----
  function drawCactus(type, x) {
    const dk = nightMode ? '#5a6a4a' : '#444';
    const lt = nightMode ? '#7a8a6a' : '#6b8c42';
    const md = nightMode ? '#6a7a5a' : '#535353';
    const hl = nightMode ? '#8a9a78' : '#8ab648';
    const s = 3, g = GROUND_Y;

    if (type === 'small') {
      for (let i = 0; i < 7; i++) { ctx.fillStyle = (i % 2 === 0) ? lt : dk; px(x + 3*s, g - (i+1)*s, s); }
      ctx.fillStyle = hl; px(x + s, g - 4*s, s); ctx.fillStyle = dk; px(x + s, g - 5*s, s); px(x, g - 5*s, s);
      ctx.fillStyle = hl; px(x + 5*s, g - 3*s, s); ctx.fillStyle = dk; px(x + 5*s, g - 4*s, s); px(x + 6*s, g - 4*s, s);
      ctx.fillStyle = lt; px(x + 3*s, g - 1*s, s); px(x + 3*s, g, s);
    } else if (type === 'medium') {
      for (let i = 0; i < 11; i++) { ctx.fillStyle = (i % 2 === 0) ? lt : dk; px(x + 3*s, g - (i+1)*s, s); }
      ctx.fillStyle = hl; px(x + s, g - 7*s, s); ctx.fillStyle = md; px(x + s, g - 8*s, s); ctx.fillStyle = dk; px(x + s, g - 9*s, s); px(x, g - 9*s, s);
      ctx.fillStyle = hl; px(x + 5*s, g - 5*s, s); ctx.fillStyle = md; px(x + 5*s, g - 6*s, s); ctx.fillStyle = dk; px(x + 6*s, g - 6*s, s); px(x + 6*s, g - 7*s, s);
      ctx.fillStyle = lt; px(x + 3*s, g - 1*s, s); px(x + 3*s, g, s);
    } else if (type === 'large') {
      for (let i = 0; i < 15; i++) { ctx.fillStyle = (i % 2 === 0) ? lt : dk; px(x + 4*s, g - (i+1)*s, s); }
      ctx.fillStyle = hl; px(x + 2*s, g - 9*s, s); ctx.fillStyle = md; px(x + 2*s, g - 10*s, s); ctx.fillStyle = dk; px(x + 2*s, g - 11*s, s); px(x + s, g - 11*s, s); px(x, g - 11*s, s);
      ctx.fillStyle = hl; px(x + 6*s, g - 5*s, s); ctx.fillStyle = md; px(x + 6*s, g - 6*s, s); ctx.fillStyle = dk; px(x + 6*s, g - 7*s, s); px(x + 7*s, g - 7*s, s); px(x + 8*s, g - 7*s, s);
      ctx.fillStyle = lt; px(x + 4*s, g - 1*s, s); px(x + 4*s, g, s);
    } else if (type === 'group_small') {
      for (let i = 0; i < 5; i++) { ctx.fillStyle = (i % 2 === 0) ? lt : dk; px(x + 2*s, g - (i+1)*s, s); }
      for (let i = 0; i < 6; i++) { ctx.fillStyle = (i % 2 === 0) ? lt : dk; px(x + 6*s, g - (i+1)*s, s); }
      ctx.fillStyle = hl; px(x, g - 3*s, s); ctx.fillStyle = dk; px(x + 8*s, g - 4*s, s);
      ctx.fillStyle = lt; px(x + 2*s, g - 1*s, s); px(x + 6*s, g - 1*s, s);
    }
  }

  // ---- TUMBLEWEED ----
  function drawTumbleweed(x, y, rot) {
    const col1 = nightMode ? '#998' : '#8b7355';
    const col2 = nightMode ? '#776' : '#a0845c';
    const col3 = nightMode ? '#665' : '#6b5b3a';
    ctx.save();
    ctx.translate(x + 12, y - 12);
    ctx.rotate(rot);
    const s = 2.5;
    // Main circle of branches
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      ctx.fillStyle = i % 3 === 0 ? col1 : i % 3 === 1 ? col2 : col3;
      ctx.fillRect(Math.cos(a) * 8 * s / 2.5 - 1, Math.sin(a) * 8 * s / 2.5 - 1, s * 1.2, s * 1.2);
    }
    // Center
    ctx.fillStyle = col2;
    ctx.fillRect(-s, -s, s * 2, s * 2);
    ctx.fillRect(-s * 0.5, -s * 1.5, s, s * 3);
    ctx.fillRect(-s * 1.5, -s * 0.5, s * 3, s);
    // Spokes
    ctx.fillStyle = col3;
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      ctx.fillRect(Math.cos(a) * 5 - 0.5, Math.sin(a) * 5 - 0.5, 1.5, 1.5);
    }
    ctx.restore();
  }

  function drawBird(x, y, frame) {
    const col = nightMode ? '#ddd' : '#535353';
    const lt = nightMode ? '#eee' : '#666';
    ctx.fillStyle = col;
    const s = 3;
    for (let i = 0; i < 5; i++) px(x + i*s, y, s);
    for (let i = 0; i < 4; i++) px(x + i*s, y + s, s);
    ctx.fillStyle = lt; px(x + 3*s, y, s);
    ctx.fillStyle = '#e8a020'; px(x + 5*s, y, s); px(x + 6*s, y, s);
    ctx.fillStyle = nightMode ? '#fff' : '#111'; px(x + s, y, s);
    ctx.fillStyle = '#e74c3c'; px(x + 7*s, y, s);
    ctx.fillStyle = col;
    if (frame === 0) { px(x + 2*s, y - s, s); px(x + 3*s, y - 2*s, s); px(x + 4*s, y - s, s); }
    else { px(x + 2*s, y + 2*s, s); px(x + 3*s, y + 3*s, s); px(x + 4*s, y + 2*s, s); }
    ctx.fillStyle = lt;
    if (frame === 0) { px(x + 2*s, y - s, s); }
    else { px(x + 2*s, y + 2*s, s); }
  }

  function drawCloud(x, y, size) {
    ctx.fillStyle = nightMode ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.06)';
    const s = 4 * size;
    ctx.fillRect(x, y, s*4, s);
    ctx.fillRect(x - s, y + s*0.3, s*6, s*0.7);
    ctx.fillRect(x + s*0.5, y - s*0.5, s*3, s*0.7);
  }

  function drawMountains() {
    mountains.forEach(m => {
      ctx.fillStyle = nightMode ? '#222244' : '#e0dcd4';
      ctx.beginPath();
      ctx.moveTo(m.x, GROUND_Y);
      ctx.lineTo(m.x + m.w / 2, GROUND_Y - m.h);
      ctx.lineTo(m.x + m.w, GROUND_Y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = nightMode ? '#2a2a4a' : '#d5d0c8';
      ctx.beginPath();
      ctx.moveTo(m.x + m.w * 0.3, GROUND_Y);
      ctx.lineTo(m.x + m.w * 0.55, GROUND_Y - m.h * 0.7);
      ctx.lineTo(m.x + m.w * 0.8, GROUND_Y);
      ctx.closePath();
      ctx.fill();
    });
  }

  function drawMoon() {
    if (!nightMode) return;
    const mx = W - 80, my = 55;
    ctx.fillStyle = '#e8e4c8';
    ctx.beginPath(); ctx.arc(mx, my, 16, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.arc(mx + 8, my - 3, 13, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#d4d0b8';
    ctx.beginPath(); ctx.arc(mx - 4, my + 4, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + 3, my - 5, 2, 0, Math.PI * 2); ctx.fill();
  }

  function drawStars() {
    if (!nightMode) return;
    stars.forEach(s => {
      ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle + frameCount * 0.05));
      ctx.fillStyle = '#fff';
      ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    ctx.globalAlpha = 1;
  }

  function drawSun() {
    if (nightMode) return;
    const sx = W - 80, sy = 55;
    ctx.fillStyle = '#f5a623';
    ctx.beginPath(); ctx.arc(sx, sy, 18, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f7c948';
    ctx.beginPath(); ctx.arc(sx, sy, 13, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#f5a623'; ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + frameCount * 0.005;
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(a) * 22, sy + Math.sin(a) * 22);
      ctx.lineTo(sx + Math.cos(a) * 28, sy + Math.sin(a) * 28);
      ctx.stroke();
    }
  }

  function drawGround() {
    // Sandy ground fill
    ctx.fillStyle = nightMode ? '#2d2d3d' : '#e8dcc8';
    ctx.fillRect(0, GROUND_Y + 2, W, H - GROUND_Y - 2);
    // Top edge
    ctx.fillStyle = nightMode ? '#535353' : '#535353';
    ctx.fillRect(0, GROUND_Y + 2, W, 2);
    // Detail line
    ctx.fillStyle = nightMode ? '#444' : '#c4b89a';
    ctx.fillRect(0, GROUND_Y + 4, W, 1);
    // Pebbles/stones
    ctx.fillStyle = nightMode ? '#3d3d4d' : '#d4c8a8';
    groundLines.forEach(g => ctx.fillRect(g.x, GROUND_Y + 7, g.w, 1));
  }

  function drawBenji() {
    let sprite, ps = 2.2;
    let drawY = benji.y - benji.h;
    let drawX = benji.x;

    if (gameState === 'gameover') sprite = deadSprite;
    else if (!benji.grounded) sprite = jumpSprite;
    else if (benji.ducking) { sprite = duckSprite; drawY = benji.y - 26; drawX = benji.x - 12; }
    else if (gameState === 'ready') {
      // Idle bounce animation
      sprite = run1;
      drawY -= Math.sin(frameCount * 0.06) * 3;
    }
    else sprite = benji.runFrame === 0 ? run1 : run2;

    drawSprite(sprite, drawX, drawY, ps);
  }

  // ---- OBSTACLE MANAGEMENT ----
  function spawnObstacle() {
    // Long grace period: no obstacles for first ~4 seconds
    if (obstacles.length === 0 && score < 60) return;

    // Large starting gap that shrinks slowly
    const minGap = Math.max(180, 400 - speed * 18);
    if (obstacles.length > 0) {
      const last = obstacles[obstacles.length - 1];
      if (W - last.x < minGap) return;
    }

    const r = Math.random();
    const canBird = score > 800;

    // First 500 points: only small cacti, very spread out
    if (score < 500) {
      obstacles.push({ type: 'small', x: W + 20, y: GROUND_Y, w: 21, h: 24 });
      return;
    }

    // 500-1000: small + medium
    if (score < 1000) {
      if (r < 0.65) obstacles.push({ type: 'small', x: W + 20, y: GROUND_Y, w: 21, h: 24 });
      else obstacles.push({ type: 'medium', x: W + 20, y: GROUND_Y, w: 21, h: 36 });
      return;
    }

    // 1000+: full variety
    if (canBird && r < 0.1) {
      obstacles.push({ type: 'bird', x: W + 20, y: GROUND_Y - 25 - Math.random() * 50, w: 24, h: 15, frame: 0, timer: 0 });
    } else if (r < 0.2 && score > 500) {
      obstacles.push({ type: 'tumbleweed', x: W + 20, y: GROUND_Y, w: 28, h: 24, rot: 0, vx: speed * 0.6 + 2 });
    } else {
      const t = Math.random();
      if (t < 0.3) obstacles.push({ type: 'small', x: W + 20, y: GROUND_Y, w: 21, h: 24 });
      else if (t < 0.55) obstacles.push({ type: 'medium', x: W + 20, y: GROUND_Y, w: 21, h: 36 });
      else if (t < 0.8) obstacles.push({ type: 'large', x: W + 20, y: GROUND_Y, w: 27, h: 48 });
      else obstacles.push({ type: 'group_small', x: W + 20, y: GROUND_Y, w: 30, h: 21 });
    }
  }

  function drawObstacle(o) {
    if (o.type === 'bird') drawBird(o.x, o.y, o.frame);
    else if (o.type === 'tumbleweed') drawTumbleweed(o.x, o.y, o.rot);
    else drawCactus(o.type, o.x);
  }

  function checkCollision(o) {
    const bx = benji.x + 12, bw = benji.ducking ? 26 : 24;
    const by = benji.ducking ? benji.y - 22 : benji.y - benji.h + 6;
    const bh = benji.ducking ? 18 : benji.h - 10;
    let ox, oy, ow, oh;
    if (o.type === 'bird') { ox = o.x + 5; oy = o.y + 2; ow = o.w - 10; oh = o.h - 4; }
    else if (o.type === 'tumbleweed') { ox = o.x + 2; oy = o.y - o.h; ow = o.w - 4; oh = o.h - 4; }
    else { ox = o.x + 3; oy = o.y - o.h; ow = o.w - 6; oh = o.h; }
    return bx < ox + ow && bx + bw > ox && by < oy + oh && by + bh > oy;
  }

  function addParticles(x, y, count, spread) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x + (Math.random() - 0.5) * spread, y: y - Math.random() * 15,
        vx: (Math.random() - 0.5) * 4 - 2, vy: -Math.random() * 4 - 1,
        life: 25 + Math.random() * 20, size: 2 + Math.random() * 4
      });
    }
  }

  function updateParticles() {
    particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; return p.life > 0; });
  }

  function drawParticles() {
    ctx.fillStyle = nightMode ? '#999' : '#aaa';
    particles.forEach(p => { ctx.globalAlpha = Math.min(1, p.life / 30); ctx.fillRect(p.x, p.y, p.size, p.size); });
    ctx.globalAlpha = 1;
  }

  function drawSpeedLines() {
    if (speed < 7 || prefersReducedMotion) return;
    const intensity = (speed - 7) / (MAX_SPEED - 7);
    const count = Math.floor(intensity * 12) + 2;
    ctx.strokeStyle = nightMode ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i < count; i++) {
      const y = Math.random() * H;
      const x = Math.random() * W * 0.3;
      const len = 30 + Math.random() * 60 * intensity;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + len, y + (Math.random() - 0.5) * 4);
      ctx.stroke();
    }
  }

  function drawPopups() {
    popups.forEach(p => {
      const alpha = Math.min(1, p.life / 15);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = nightMode ? '#f5a623' : '#7C3AED';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(p.text, p.x, p.y);
    });
    ctx.globalAlpha = 1;
  }

  function drawScore() {
    const s = String(Math.floor(score)).padStart(5, '0');
    const h = String(Math.floor(highScore)).padStart(5, '0');
    ctx.font = '14px monospace'; ctx.textAlign = 'right';
    ctx.fillStyle = scoreFlash > 0 ? (nightMode ? '#f5a623' : '#7C3AED') : (nightMode ? '#fff' : '#535353');
    if (scoreFlash > 0) scoreFlash--;
    if (scoreFlash > 0) {
      ctx.strokeStyle = nightMode ? 'rgba(245,166,35,0.5)' : 'rgba(124,58,237,0.5)';
      ctx.lineWidth = 4 * (scoreFlash / 12);
      ctx.strokeRect(2, 2, W - 4, H - 4);
    }
    ctx.fillText(s, W - 20, 25);
    if (highScore > 0) { ctx.fillStyle = nightMode ? '#aaa' : '#999'; ctx.fillText('HI ' + h, W - 100, 25); }
  }

  function drawTitle() {
    ctx.fillStyle = nightMode ? '#fff' : '#535353';
    ctx.font = 'bold 20px monospace'; ctx.textAlign = 'left';
    ctx.fillText('BENJI RUNNER', 20, 25);
    ctx.font = '14px monospace'; ctx.fillText('🐾', 152, 25);
    // Day/night badge
    if (gameState === 'playing') {
      ctx.font = '12px monospace';
      ctx.fillText(nightMode ? '🌙' : '☀️', 170, 25);
      // Pause button (top-left, for mobile)
      ctx.fillStyle = nightMode ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.15)';
      ctx.fillRect(0, 0, 32, 32);
      ctx.fillStyle = nightMode ? '#fff' : '#535353';
      ctx.fillRect(8, 8, 5, 16);
      ctx.fillRect(19, 8, 5, 16);
    }
  }

  function drawReady() {
    ctx.fillStyle = nightMode ? '#fff' : '#535353';
    ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
    ctx.fillText('BENJI RUNNER', W/2, H/2 - 60);
    ctx.font = '40px serif'; ctx.fillText('🐾', W/2, H/2 - 15);
    ctx.font = '14px monospace';
    ctx.fillText('Press SPACE or tap to start', W/2, H/2 + 20);
    ctx.font = '11px monospace'; ctx.fillStyle = nightMode ? '#aaa' : '#999';
    ctx.fillText('SPACE / ↑ Jump  •  Double tap for double jump', W/2, H/2 + 45);
    if (highScore > 0) {
      ctx.fillStyle = nightMode ? '#f5a623' : '#7C3AED'; ctx.font = '13px monospace';
      ctx.fillText('High Score: ' + highScore, W/2, H/2 + 70);
    }
  }

  function drawGameOver() {
    ctx.fillStyle = nightMode ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = nightMode ? '#fff' : '#535353';
    ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
    ctx.fillText('G A M E   O V E R', W/2, H/2 - 40);
    ctx.font = '14px monospace';
    ctx.fillText('Score: ' + Math.floor(score), W/2, H/2 - 10);
    if (score >= highScore && score > 0) {
      ctx.fillStyle = nightMode ? '#f5a623' : '#7C3AED'; ctx.font = 'bold 14px monospace';
      ctx.fillText('★ NEW HIGH SCORE ★', W/2, H/2 + 10);
    } else {
      ctx.fillStyle = nightMode ? '#aaa' : '#999'; ctx.fillText('Best: ' + highScore, W/2, H/2 + 10);
    }
    // Restart icon
    const cx = W/2, cy = H/2 + 40;
    ctx.strokeStyle = nightMode ? '#fff' : '#535353'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, 12, 0.5, Math.PI*1.8); ctx.stroke();
    ctx.fillStyle = nightMode ? '#fff' : '#535353';
    ctx.beginPath(); ctx.moveTo(cx+10, cy-8); ctx.lineTo(cx+15, cy-1); ctx.lineTo(cx+7, cy-1); ctx.closePath(); ctx.fill();
    ctx.font = '11px monospace';
    ctx.fillText('Press SPACE or tap to restart', W/2, H/2 + 68);
  }

  function drawPaused() {
    ctx.fillStyle = nightMode ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = nightMode ? '#fff' : '#535353';
    ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
    ctx.fillText('P A U S E D', W/2, H/2 - 10);
    ctx.font = '12px monospace';
    ctx.fillStyle = nightMode ? '#aaa' : '#999';
    ctx.fillText('Press P or Esc to resume', W/2, H/2 + 20);
  }

  function drawCountdown() {
    const num = Math.ceil(countdown / 30); // 3, 2, 1
    const text = countdown > 30 ? String(num) : 'GO!';
    const pulse = 1 + Math.sin(countdown * 0.3) * 0.1;
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = countdown > 30
      ? (nightMode ? '#fff' : '#535353')
      : (nightMode ? '#f5a623' : '#7C3AED');
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  // ---- MAIN LOOP ----
  function update() {
    frameCount++;
    if (shakeTimer > 0) {
      shakeTimer--;
      shakeX = (Math.random() - 0.5) * shakeTimer * 0.8;
      shakeY = (Math.random() - 0.5) * shakeTimer * 0.5;
    } else { shakeX = 0; shakeY = 0; }

    // Countdown state
    if (gameState === 'countdown') {
      const prev = Math.ceil(countdown / 30);
      countdown--;
      const curr = Math.ceil(countdown / 30);
      if (curr !== prev && countdown > 0) playTick();
      if (countdown === 30) playGo();
      if (countdown <= 0) gameState = 'playing';
      return;
    }
    if (gameState !== 'playing') return;
    if (paused) return;

    // Very gentle speed ramp
    speed = Math.min(MAX_SPEED, BASE_SPEED + score * SPEED_INCREASE);
    score += speed * 0.1;

    // Milestone flash
    const m = Math.floor(score / 100);
    if (m > lastMilestone) { lastMilestone = m; scoreFlash = 12; playDing(); popups.push({ x: W - 40, y: 45, text: '+' + (m * 100), life: 40 }); }

    // Night toggle
    const prev = Math.floor((score - speed * 0.1) / 700), curr = Math.floor(score / 700);
    if (curr !== prev) nightMode = !nightMode;

    // Physics
    if (!benji.grounded) {
      benji.vy += GRAVITY; benji.y += benji.vy;
      if (benji.y >= GROUND_Y) { benji.y = GROUND_Y; benji.vy = 0; benji.grounded = true; benji.canDoubleJump = true; addParticles(benji.x + 15, benji.y, 5, 12); }
    }

    // Animate
    if (benji.grounded && !benji.ducking) {
      benji.runTimer++;
      const animSpeed = Math.max(4, 8 - Math.floor(speed * 0.3));
      if (benji.runTimer > animSpeed) { benji.runTimer = 0; benji.runFrame = 1 - benji.runFrame; }
    }

    if (benji.grounded && !benji.ducking && Math.random() < 0.3) {
      particles.push({
        x: benji.x + 5 + Math.random() * 8, y: benji.y - 2,
        vx: -speed * 0.4 - Math.random(), vy: -Math.random() * 1.5,
        life: 10 + Math.random() * 8, size: 1.5 + Math.random() * 2
      });
    }

    spawnObstacle();

    obstacles.forEach(o => {
      o.x -= speed;
      if (o.type === 'bird') { o.timer++; if (o.timer > 8) { o.timer = 0; o.frame = 1 - o.frame; } }
      if (o.type === 'tumbleweed') { o.rot += 0.15; o.x -= o.vx * 0.3; }
    });
    obstacles = obstacles.filter(o => o.x > -80);

    for (const o of obstacles) {
      if (checkCollision(o)) {
        gameState = 'gameover'; shakeTimer = prefersReducedMotion ? 0 : 15; playDeath();
        if (score > highScore) { highScore = Math.floor(score); localStorage.setItem('benjiHighScore', highScore); }
        addParticles(benji.x + 20, benji.y - 20, 12, 30);
        break;
      }
    }

    groundLines.forEach(g => {
      g.x -= speed * 0.6;
      if (g.x < -15) { g.x = W + Math.random() * 30; g.w = 2 + Math.random() * 10; }
    });
    clouds.forEach(c => {
      c.x -= speed * 0.12;
      if (c.x < -60) { c.x = W + 60 + Math.random() * 100; c.y = 15 + Math.random() * 50; }
    });
    mountains.forEach(m => {
      m.x -= speed * 0.08;
      if (m.x + m.w < -10) { m.x = W + Math.random() * 40; m.h = 40 + Math.random() * 50; m.w = 80 + Math.random() * 60; }
    });

    // Score popups
    popups = popups.filter(p => { p.y -= 1.2; p.life--; return p.life > 0; });
  }

  function draw() {
    ctx.save(); ctx.translate(shakeX, shakeY);
    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    if (nightMode) {
      skyGrad.addColorStop(0, '#0d0d1a');
      skyGrad.addColorStop(0.6, '#1a1a2e');
      skyGrad.addColorStop(1, '#252540');
    } else {
      skyGrad.addColorStop(0, '#c8ddf0');
      skyGrad.addColorStop(0.5, '#e8eff7');
      skyGrad.addColorStop(1, '#f7f7f7');
    }
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);
    drawStars();
    drawMoon();
    drawSun();
    drawMountains();
    clouds.forEach(c => drawCloud(c.x, c.y, c.size));
    drawGround();
    if (gameState === 'playing') drawSpeedLines();
    drawTitle();

    if (gameState === 'ready') { drawBenji(); drawReady(); }
    else if (gameState === 'countdown') { drawBenji(); drawCountdown(); }
    else if (gameState === 'playing') { obstacles.forEach(drawObstacle); drawBenji(); drawPopups(); drawScore(); if (paused) drawPaused(); }
    else if (gameState === 'gameover') { obstacles.forEach(drawObstacle); drawParticles(); drawScore(); drawGameOver(); }

    ctx.restore();
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  function resetGame() {
    gameState = 'countdown'; countdown = 100;
    score = 0; speed = BASE_SPEED;
    obstacles = []; particles = []; nightMode = false; popups = [];
    mountains = [];
    for (let i = 0; i < 8; i++) {
      mountains.push({ x: i * 130 + Math.random() * 40, h: 40 + Math.random() * 50, w: 80 + Math.random() * 60 });
    }
    lastMilestone = 0; scoreFlash = 0; shakeTimer = 0; paused = false;
    benji.y = GROUND_Y; benji.vy = 0; benji.grounded = true; benji.ducking = false; benji.runFrame = 0; benji.canDoubleJump = true;
  }

  function handleAction() {
    if (gameState === 'ready' || gameState === 'gameover') resetGame();
    else if (gameState === 'playing' && benji.grounded) {
      benji.vy = JUMP_FORCE; benji.grounded = false; benji.ducking = false;
      benji.canDoubleJump = true;
      playJump();
    }
    else if (gameState === 'playing' && !benji.grounded && benji.canDoubleJump) {
      benji.vy = JUMP_FORCE * 0.85;
      benji.canDoubleJump = false;
      playJump();
      addParticles(benji.x + 20, benji.y - 5, 6, 10);
    }
  }
  function handleDuck(a) { if (gameState === 'playing' && benji.grounded) { benji.ducking = a; if (a) playDuck(); } }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); if (!paused) handleAction(); }
    if (e.code === 'ArrowDown') { e.preventDefault(); if (!paused) handleDuck(true); }
    if ((e.code === 'KeyP' || e.code === 'Escape') && gameState === 'playing') { paused = !paused; }
  });
  document.addEventListener('keyup', e => { if (e.code === 'ArrowDown') handleDuck(false); });

  canvas.addEventListener('mousedown', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) / rect.width * W;
    const cy = (e.clientY - rect.top) / rect.height * H;
    if (gameState === 'playing' && cx < 35 && cy < 35) { paused = !paused; return; }
    if (cy > H * 0.6 && gameState === 'playing') handleDuck(true);
    else handleAction();
  });
  canvas.addEventListener('mouseup', () => handleDuck(false));

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches[0].clientX - rect.left) / rect.width * W;
    const cy = (e.touches[0].clientY - rect.top) / rect.height * H;
    if (gameState === 'playing' && cx < 35 && cy < 35) { paused = !paused; return; }
    if (cy > H * 0.6 && gameState === 'playing') handleDuck(true);
    else handleAction();
  }, { passive: false });
  canvas.addEventListener('touchend', e => { e.preventDefault(); handleDuck(false); }, { passive: false });
  window.addEventListener('keydown', e => { if (e.code === 'Space') e.preventDefault(); });

  // Auto-focus canvas for keyboard
  canvas.focus();

  loop();
})();
</script>
</body>
</html>
