<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benji Flip 🃏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a0a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        
        .game-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        
        .game-title span {
            animation: bounce 0.5s ease infinite alternate;
        }
        
        @keyframes bounce {
            to { transform: translateY(-5px); }
        }
        
        .stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        
        .stat {
            background: rgba(255, 0, 255, 0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 10px;
            border: 2px solid #ff00ff;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #00ffff;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 3px solid #00ffff;
        }
        
        .card {
            width: 80px;
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }
        
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card.matched .card-inner {
            animation: matchPulse 0.5s ease;
        }
        
        @keyframes matchPulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        
        .card-front {
            background: linear-gradient(145deg, #2a1a4e, #1a0a2e);
            border: 2px solid #ff00ff;
        }
        
        .card-front::after {
            content: '🐾';
            font-size: 1.5rem;
            opacity: 0.5;
        }
        
        .card-back {
            background: linear-gradient(145deg, #00ffff, #00cccc);
            transform: rotateY(180deg);
            border: 2px solid #fff;
        }
        
        .card-back span {
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }
        
        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .btn-primary {
            background: #ff00ff;
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        
        .btn-secondary {
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
        }
        
        .btn-secondary:hover {
            background: #00ffff;
            color: #0a0a0f;
        }
        
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 2rem 3rem;
            border-radius: 20px;
            border: 3px solid #ff00ff;
            text-align: center;
            display: none;
            z-index: 100;
        }
        
        .message.show {
            display: block;
            animation: popIn 0.5s ease;
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        .message h2 {
            font-size: 2rem;
            color: #ff00ff;
            margin-bottom: 1rem;
        }
        
        .message p {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00ffff;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border: 2px solid #00ffff;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            background: #00ffff;
            color: #0a0a0f;
        }

        @media (max-width: 500px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                padding: 10px;
            }
            .card {
                width: 60px;
                height: 60px;
            }
            .card-front, .card-back {
                font-size: 1.8rem;
            }
            .card-front::after {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <a href="games.html" class="back-link">← Games</a>
    
    <h1 class="game-title"><span>🐾</span> Benji Flip</h1>
    
    <div class="stats">
        <div class="stat">
            <div class="stat-label">MOVES</div>
            <div class="stat-value" id="moves">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">PAIRS</div>
            <div class="stat-value" id="pairs">0/8</div>
        </div>
        <div class="stat">
            <div class="stat-label">TIME</div>
            <div class="stat-value" id="timer">0:00</div>
        </div>
    </div>
    
    <div class="game-board" id="gameBoard"></div>
    
    <div class="controls">
        <button class="btn btn-secondary" onclick="changeDifficulty()">Levels: Easy</button>
        <button class="btn btn-primary" onclick="restartGame()">Restart</button>
    </div>
    
    <div class="message" id="winMessage">
        <h2>🎉 YOU WIN! 🎉</h2>
        <p>Moves: <span id="finalMoves">0</span></p>
        <p>Time: <span id="finalTime">0:00</span></p>
        <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const emojis = ['🦴', '🎾', '🐕', '🦮', '🐩', '🐕‍🦺', '🎪', '🏆'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let canFlip = true;
        let timerInterval = null;
        let seconds = 0;
        let difficulty = 'easy';
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function formatTime(secs) {
            const mins = Math.floor(secs / 60);
            const s = secs % 60;
            return `${mins}:${s.toString().padStart(2, '0')}`;
        }
        
        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            document.getElementById('timer').textContent = '0:00';
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').textContent = formatTime(seconds);
            }, 1000);
        }
        
        function stopTimer() {
            clearInterval(timerInterval);
        }
        
        function initGame() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            canFlip = true;
            
            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0/8';
            document.getElementById('winMessage').classList.remove('show');
            
            let selectedEmojis = difficulty === 'easy' ? emojis.slice(0, 8) : 
                              difficulty === 'medium' ? [...emojis, '🥎', '🎿', '🎯', '🎲'].slice(0, 12) :
                              [...emojis, '🥎', '🎿', '🎯', '🎲', '🥏', '🪀', '🎱', '🪁'].slice(0, 16);
            
            cards = shuffle([...selectedEmojis, ...selectedEmojis]);
            
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back"><span>${emoji}</span></div>
                    </div>
                `;
                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
            });
            
            document.getElementById('pairs').textContent = `0/${selectedEmojis.length}`;
            startTimer();
        }
        
        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.classList.add('flipped');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }
        
        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            
            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                
                const totalPairs = cards.length / 2;
                document.getElementById('pairs').textContent = `${matchedPairs}/${totalPairs}`;
                
                if (matchedPairs === totalPairs) {
                    setTimeout(showWin, 500);
                }
                
                flippedCards = [];
                canFlip = true;
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }
        
        function showWin() {
            stopTimer();
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = formatTime(seconds);
            document.getElementById('winMessage').classList.add('show');
        }
        
        function restartGame() {
            stopTimer();
            initGame();
        }
        
        function changeDifficulty() {
            const levels = ['easy', 'medium', 'hard'];
            const currentIndex = levels.indexOf(difficulty);
            difficulty = levels[(currentIndex + 1) % levels.length];
            
            const gridSize = difficulty === 'easy' ? 4 : difficulty === 'medium' ? 4 : 4;
            document.querySelector('.game-board').style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            document.querySelector('.controls .btn-secondary').textContent = `Levels: ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;
            restartGame();
        }
        
        initGame();
    </script>
</body>
</html>
