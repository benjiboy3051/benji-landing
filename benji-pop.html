<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benji Pop 🫧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .game-header {
            text-align: center;
            padding: 1rem;
            width: 100%;
        }
        
        .title {
            font-size: 2rem;
            color: #ff69b4;
            text-shadow: 0 0 20px #ff69b4;
            animation: float 2s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 1rem;
            font-size: 1.2rem;
        }
        
        .stat {
            background: rgba(255, 105, 180, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            border: 2px solid #ff69b4;
        }
        
        .stat-value {
            color: #ff69b4;
            font-weight: bold;
        }
        
        canvas {
            border: 3px solid #ff69b4;
            border-radius: 15px;
            background: radial-gradient(circle at bottom, #1a0a2e 0%, #0a0a1a 100%);
            cursor: pointer;
        }
        
        .instructions {
            margin-top: 1rem;
            color: #888;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .game-over.show {
            display: flex;
        }
        
        .game-over h2 {
            font-size: 3rem;
            color: #ff69b4;
            text-shadow: 0 0 30px #ff69b4;
            margin-bottom: 1rem;
        }
        
        .game-over p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .restart-btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: #ff69b4;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff69b4;
        }
        
        .combo-text {
            position: fixed;
            font-size: 2rem;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
            pointer-events: none;
            animation: comboAnim 0.5s ease-out forwards;
        }
        
        @keyframes comboAnim {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="title">🐶 BENJI POP 🫧</h1>
        <div class="stats">
            <div class="stat">SCORE: <span class="stat-value" id="score">0</span></div>
            <div class="stat">TIME: <span class="stat-value" id="time">60</span></div>
            <div class="stat">COMBO: <span class="stat-value" id="combo">0</span></div>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    
    <p class="instructions">Click or tap the bubbles before they escape!</p>
    
    <div class="game-over" id="gameOver">
        <h2>GAME OVER!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Max Combo: <span id="maxCombo">0</span></p>
        <button class="restart-btn" onclick="restartGame()">PLAY AGAIN 🐶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let score = 0;
        let time = 60;
        let combo = 0;
        let maxCombo = 0;
        let gameRunning = true;
        let bubbles = [];
        let lastTime = 0;
        let bubbleSpawnTimer = 0;
        
        const bubbleColors = ['#ff69b4', '#00ffff', '#ffff00', '#00ff00', '#ff6600'];
        
        class Bubble {
            constructor() {
                this.x = Math.random() * (canvas.width - 80) + 40;
                this.y = canvas.height + 30;
                this.radius = 20 + Math.random() * 30;
                this.speed = 0.5 + Math.random() * 1.5;
                this.color = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
                this.popped = false;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.05 + Math.random() * 0.05;
            }
            
            update(deltaTime) {
                this.y -= this.speed * deltaTime * 60;
                this.wobble += this.wobbleSpeed * deltaTime * 60;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x + Math.sin(this.wobble) * 5, this.y);
                
                const gradient = ctx.createRadialGradient(-this.radius * 0.3, -this.radius * 0.3, 0, 0, 0, this.radius);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.1)');
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
                
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.restore();
            }
            
            contains(px, py) {
                const dx = px - (this.x + Math.sin(this.wobble) * 5);
                const dy = py - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }
            
            getPoints() {
                const sizeScore = Math.floor((this.radius - 20) / 10);
                return (sizeScore + 1) * 10;
            }
        }
        
        function spawnBubble() {
            bubbles.push(new Bubble());
        }
        
        function popBubble(bubble, px, py) {
            if (bubble.popped) return;
            
            bubble.popped = true;
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            
            const points = bubble.getPoints() * combo;
            score += points;
            
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            
            showComboText(px, py, `+${points}`, combo);
            
            createPopEffect(bubble.x, bubble.y, bubble.color);
        }
        
        function createPopEffect(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i;
                const speed = 2 + Math.random() * 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 3 + Math.random() * 3,
                    color: color,
                    alpha: 1
                });
            }
        }
        
        let particles = [];
        
        function showComboText(x, y, text, combo) {
            const el = document.createElement('div');
            el.className = 'combo-text';
            el.style.left = (canvas.offsetLeft + x) + 'px';
            el.style.top = (canvas.offsetTop + y) + 'px';
            el.textContent = combo >= 3 ? text + ' COMBO!' : text;
            if (combo >= 5) {
                el.style.color = '#ffff00';
                el.style.fontSize = '2.5rem';
            }
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 500);
        }
        
        function update(deltaTime) {
            if (!gameRunning) return;
            
            bubbleSpawnTimer += deltaTime;
            const spawnRate = Math.max(0.3, 1 - (score / 2000));
            if (bubbleSpawnTimer > spawnRate) {
                spawnBubble();
                bubbleSpawnTimer = 0;
            }
            
            bubbles.forEach(bubble => bubble.update(deltaTime));
            bubbles = bubbles.filter(bubble => !bubble.popped && bubble.y > -bubble.radius);
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= deltaTime * 2;
            });
            particles = particles.filter(p => p.alpha > 0);
            
            time -= deltaTime;
            if (time <= 0) {
                time = 0;
                endGame();
            }
            document.getElementById('time').textContent = Math.ceil(time);
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            bubbles.forEach(bubble => bubble.draw());
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }
        
        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOver').classList.add('show');
        }
        
        function restartGame() {
            score = 0;
            time = 60;
            combo = 0;
            maxCombo = 0;
            bubbles = [];
            particles = [];
            gameRunning = true;
            document.getElementById('score').textContent = 0;
            document.getElementById('time').textContent = 60;
            document.getElementById('combo').textContent = 0;
            document.getElementById('gameOver').classList.remove('show');
        }
        
        function gameLoop(timestamp) {
            const deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            
            update(deltaTime);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            let hit = false;
            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    popBubble(bubbles[i], x, y);
                    hit = true;
                    break;
                }
            }
            
            if (!hit) {
                combo = 0;
                document.getElementById('combo').textContent = 0;
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            let hit = false;
            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    popBubble(bubbles[i], x, y);
                    hit = true;
                    break;
                }
            }
            
            if (!hit) {
                combo = 0;
                document.getElementById('combo').textContent = 0;
            }
        });
        
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
